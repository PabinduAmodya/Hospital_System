name: Build & Deploy to Cloud Run

on:
  push:
    branches: [master]
  workflow_dispatch: # Allow manual trigger

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-southeast1
  BACKEND_SERVICE: hospital-backend
  FRONTEND_SERVICE: hospital-frontend
  REGISTRY: ${{ secrets.GCP_PROJECT_ID }}/hospital-images

jobs:
  # ── Build & Deploy Backend ──
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Create Artifact Registry (if not exists)
        run: |
          gcloud artifacts repositories describe hospital-images \
            --location=${{ env.GCP_REGION }} 2>/dev/null || \
          gcloud artifacts repositories create hospital-images \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --description="Hospital Management System images"

      - name: Build & Push Backend Image
        run: |
          IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.REGISTRY }}/backend:${{ github.sha }}
          docker build -t $IMAGE ./backend
          docker push $IMAGE

      - name: Deploy Backend to Cloud Run
        run: |
          IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.REGISTRY }}/backend:${{ github.sha }}
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image=$IMAGE \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --set-env-vars="SPRING_PROFILES_ACTIVE=prod" \
            --set-env-vars="TIDB_PASSWORD=${{ secrets.TIDB_PASSWORD }}" \
            --set-env-vars="GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" \
            --set-env-vars="FRONTEND_URL=${{ secrets.FRONTEND_URL }}"

      - name: Get Backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $URL"

    outputs:
      backend_url: ${{ steps.backend-url.outputs.url }}

  # ── Build & Deploy Frontend ──
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build & Push Frontend Image
        run: |
          IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.REGISTRY }}/frontend:${{ github.sha }}
          docker build \
            --build-arg VITE_API_URL=${{ needs.deploy-backend.outputs.backend_url }}/api \
            -t $IMAGE ./frontend
          docker push $IMAGE

      - name: Deploy Frontend to Cloud Run
        run: |
          IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.REGISTRY }}/frontend:${{ github.sha }}
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image=$IMAGE \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2

      - name: Get Frontend URL
        run: |
          URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "Frontend URL: $URL"
          echo "### Deployment Complete! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: $URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: ${{ needs.deploy-backend.outputs.backend_url }}" >> $GITHUB_STEP_SUMMARY
